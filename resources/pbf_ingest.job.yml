resources:
  jobs:
    pbf_datasource_demo:
      name: "PBF Ingestion Demo"

      parameters:
        - name: region
          default: "andorra"
        - name: geometryType
          default: "WKT"
        - name: emptyTagFilter
          default: "true"
        - name: keyFilter
          default: "building"
        - name: tagFilter
          default: ""
        - name: refreshPbf
          default: "false"

      base_parameters: &common_base_parameters
        pbfPath: "${var.pbf_volume_path}/{{job.parameters.region}}-latest.osm.pbf"
        bronzeTable: "${var.bronze_table_prefix}{{job.parameters.region}}_bronze"

      trigger:
        periodic:
          interval: 1
          unit: WEEKS

      # email_notifications:
      #   on_failure:
      #     - <your.email@your.org>

      # Serverless environment shared by all notebook tasks.
      # osmium is preinstalled on the notebook env (driver side); the DataSource
      # worker pool bootstraps it at runtime — see _bootstrap_osmium in
      # src/load_datasource.ipynb.
      environments:
        - environment_key: pbf_env
          spec:
            client: "3"
            dependencies:
              - osmium
              - geopandas
              - folium

      tasks:
        - task_key: pbf_refresh
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.refreshPbf}}"
            right: "true"

        - task_key: download_pbf
          depends_on:
            - task_key: pbf_refresh
              outcome: "true"
          environment_key: pbf_env
          notebook_task:
            notebook_path: ../src/download_pbf.ipynb
            base_parameters:
              <<: *common_base_parameters

        - task_key: pbf_ingest_bronze
          depends_on:
            - task_key: pbf_refresh
              outcome: "false"
            - task_key: download_pbf
          run_if: AT_LEAST_ONE_SUCCESS
          environment_key: pbf_env
          notebook_task:
            notebook_path: ../src/pbf_ingest.ipynb
            base_parameters:
              <<: *common_base_parameters

        - task_key: density_analysis
          depends_on:
            - task_key: pbf_ingest_bronze
          run_if: ALL_SUCCESS
          environment_key: pbf_env
          notebook_task:
            notebook_path: ../src/analytics.ipynb
            base_parameters:
              <<: *common_base_parameters
